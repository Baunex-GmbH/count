quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,https://count.baunex.ch
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.limits.max-body-size=12M

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/count}
quarkus.datasource.username=${DB_USER:count}
quarkus.datasource.password=${DB_PASSWORD:count}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none

# Flyway
quarkus.flyway.migrate-at-start=true

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=count-app
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=86400
smallrye.jwt.new-token.issuer=count-app

# Exoscale SOS (S3-compatible)
count.sos.endpoint=${SOS_ENDPOINT:https://sos-ch-gva-2.exo.io}
count.sos.access-key=${SOS_ACCESS_KEY:}
count.sos.secret-key=${SOS_SECRET_KEY:}
count.sos.bucket=${SOS_BUCKET:count-belege}
