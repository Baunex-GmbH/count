services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - SOS_ENDPOINT=${SOS_ENDPOINT:-https://sos-ch-gva-2.exo.io}
      - SOS_ACCESS_KEY=${SOS_ACCESS_KEY}
      - SOS_SECRET_KEY=${SOS_SECRET_KEY}
      - SOS_BUCKET=${SOS_BUCKET:-count-belege}
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
